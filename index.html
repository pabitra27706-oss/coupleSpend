<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="indigo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="Track and compare spending with your partner" />
  <meta name="theme-color" content="#6366f1" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CoupleSpend" />

  <title>CoupleSpend - Finance Tracker</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
</head>
<body>

<!-- ── App Shell ───────────────────────── -->
<div class="auth-wrapper">

  <!-- ── Background Decoration ─────────── -->
  <div class="auth-bg">
    <div class="auth-bg-circle auth-bg-circle-1"></div>
    <div class="auth-bg-circle auth-bg-circle-2"></div>
    <div class="auth-bg-circle auth-bg-circle-3"></div>
  </div>

  <!-- ── Auth Container ─────────────────── -->
  <div class="auth-container">

    <!-- ── Logo ───────────────────────── -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"/>
          <path d="M8 12h8M12 8v8"/>
          <circle cx="8"  cy="9"  r="1" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="15" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div class="auth-logo-text">
        <span class="auth-logo-name">CoupleSpend</span>
        <span class="auth-logo-tagline">Finance Tracker</span>
      </div>
    </div>

    <!-- ── Tab Switcher ───────────────── -->
    <div class="auth-tabs">
      <button
        class="auth-tab active"
        id="tab-login"
        onclick="switchTab('login')"
      >
        Sign In
      </button>
      <button
        class="auth-tab"
        id="tab-register"
        onclick="switchTab('register')"
      >
        Create Account
      </button>
      <div class="auth-tab-indicator" id="tab-indicator"></div>
    </div>

    <!-- ── Login Form ─────────────────── -->
    <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">

      <div class="input-group">
        <label class="input-label" for="login-email">Email</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
          </span>
          <input
            class="input input-with-icon"
            type="email"
            id="login-email"
            placeholder="you@email.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="login-password">Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input
            class="input input-with-icon"
            type="password"
            id="login-password"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          />
          <button
            type="button"
            class="input-icon-right btn-icon btn-ghost"
            onclick="togglePassword('login-password', this)"
            aria-label="Toggle password"
          >
            <svg class="eye-icon" viewBox="0 0 24 24">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="auth-forgot">
        <button
          type="button"
          class="btn-ghost text-sm"
          onclick="handleForgotPassword()"
        >
          Forgot password?
        </button>
      </div>

      <div class="auth-error hidden" id="login-error"></div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
        <span class="btn-text">Sign In</span>
        <span class="spinner spinner-sm hidden" id="login-spinner"></span>
      </button>

      <!-- ── Divider ───────────────────── -->
      <div class="divider-text">or continue with</div>

      <!-- ── Google Sign In ────────────── -->
      <button
        type="button"
        class="btn btn-secondary btn-full"
        onclick="handleGoogleLogin()"
        id="google-btn"
      >
        <svg class="google-icon" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

    </form>

    <!-- ── Register Form ──────────────── -->
    <form
      class="auth-form hidden"
      id="form-register"
      onsubmit="handleRegister(event)"
    >

      <div class="auth-form-row">
        <div class="input-group">
          <label class="input-label" for="reg-name">Your Name</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </span>
            <input
              class="input input-with-icon"
              type="text"
              id="reg-name"
              placeholder="Your name"
              autocomplete="given-name"
              required
            />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="reg-partner">Partner Name</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            </span>
            <input
              class="input input-with-icon"
              type="text"
              id="reg-partner"
              placeholder="Partner's name"
              required
            />
          </div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="reg-email">Email</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
          </span>
          <input
            class="input input-with-icon"
            type="email"
            id="reg-email"
            placeholder="you@email.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="reg-currency">Base Currency</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M9 9h4.5a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3H15"/></svg>
          </span>
          <select class="input input-with-icon" id="reg-currency">
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="INR">INR - Indian Rupee</option>
            <option value="MYR">MYR - Malaysian Ringgit</option>
            <option value="SGD">SGD - Singapore Dollar</option>
            <option value="PHP">PHP - Philippine Peso</option>
            <option value="IDR">IDR - Indonesian Rupiah</option>
            <option value="THB">THB - Thai Baht</option>
            <option value="JPY">JPY - Japanese Yen</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="reg-password">Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input
            class="input input-with-icon"
            type="password"
            id="reg-password"
            placeholder="Min 8 characters"
            autocomplete="new-password"
            required
            minlength="8"
          />
          <button
            type="button"
            class="input-icon-right btn-icon btn-ghost"
            onclick="togglePassword('reg-password', this)"
            aria-label="Toggle password"
          >
            <svg class="eye-icon" viewBox="0 0 24 24">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="password-strength" id="password-strength">
          <div class="strength-bars">
            <div class="strength-bar" id="s-bar-1"></div>
            <div class="strength-bar" id="s-bar-2"></div>
            <div class="strength-bar" id="s-bar-3"></div>
            <div class="strength-bar" id="s-bar-4"></div>
          </div>
          <span class="strength-label" id="strength-label">Enter password</span>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="reg-confirm">Confirm Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </span>
          <input
            class="input input-with-icon"
            type="password"
            id="reg-confirm"
            placeholder="Repeat password"
            autocomplete="new-password"
            required
          />
        </div>
      </div>

      <div class="auth-error hidden" id="register-error"></div>

      <button
        type="submit"
        class="btn btn-primary btn-full btn-lg"
        id="register-btn"
      >
        <span class="btn-text">Create Account</span>
        <span class="spinner spinner-sm hidden" id="register-spinner"></span>
      </button>

    </form>

    <!-- ── Footer ─────────────────────── -->
    <p class="auth-footer">
      By continuing you agree to our
      <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
    </p>

  </div>
</div>

<!-- ── Toast Container ──────────────────── -->
<div class="toast-container" id="toast-container"></div>

<!-- ── Scripts ──────────────────────────── -->
<script src="js/core/firebase-config.js"></script>
<script src="js/core/auth.js"></script>
<script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker
        .register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW failed:', err));
    });
  }
</script>

</body>
</html>
